<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MinhaFamília — Orçamento &amp; Finanças</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
</head>
<body>
<div class="app" id="app" style="display:none;">

<div class="sidebar">
  <div class="brand">
    <div class="brand-icon">OF</div>
    <div>
      <div class="brand-name">MinhaFamília</div>
      <div class="brand-sub">Orçamento &amp; Finanças</div>
    </div>
  </div>

  <button class="nav-item active" data-screen="dashboard" onclick="Nav.show('dashboard')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
    Painel geral
  </button>
  <button class="nav-item" data-screen="transacoes" onclick="Nav.show('transacoes')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l4-4 4 4M7 3v14M21 17l-4 4-4-4M17 21V7"/></svg>
    Transações
  </button>
  <button class="nav-item" data-screen="contas" onclick="Nav.show('contas')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
    Contas
  </button>
  <button class="nav-item" data-screen="cartoes" onclick="Nav.show('cartoes')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="15" rx="2"/><path d="M2 10h20M6 15h4"/></svg>
    Cartões de crédito
  </button>
  <button class="nav-item" data-screen="categorias" onclick="Nav.show('categorias')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10L12 2 4 10v10a2 2 0 002 2h4v-6h4v6h4a2 2 0 002-2z"/></svg>
    Categorias
  </button>
  <button class="nav-item" data-screen="orcamentos" onclick="Nav.show('orcamentos')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M7 15l4-6 3 4 5-8"/></svg>
    Orçamentos
  </button>
  <button class="nav-item" data-screen="metas" onclick="Nav.show('metas')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
    Metas
  </button>
  <button class="nav-item" data-screen="investimentos" onclick="Nav.show('investimentos')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8M15 7h6v6"/></svg>
    Investimentos
  </button>
  <button class="nav-item" data-screen="relatorios" onclick="Nav.show('relatorios')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19h16M8 19V9M13 19V5M18 19v-7"/></svg>
    Relatórios
  </button>
  <button class="nav-item" data-screen="chatia" onclick="Nav.show('chatia')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 01-1 4 8.5 8.5 0 01-7.5 4.5 8.4 8.4 0 01-4-1L3 20l1-4.5a8.4 8.4 0 01-1-4A8.5 8.5 0 0111 3a8.4 8.4 0 015 1.5"/></svg>
    Chat IA <span id="chatia-badge" style="font-size:9px; background:var(--card2); padding:2px 6px; border-radius:6px; margin-left:auto; color:var(--text3);">OFF</span>
  </button>

  <div class="nav-sep"></div>

  <button class="nav-item" data-screen="config" onclick="Nav.show('config')">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Configurações
  </button>

  <div class="nav-foot">
    <button class="pill-btn danger" onclick="Auth.lockNow()">Bloquear agora</button>
  </div>
</div>

<div class="main" id="mainArea">
  <div id="syncBanner"></div>
  <div class="screen active" id="screen-dashboard"></div>
  <div class="screen" id="screen-transacoes"></div>
  <div class="screen" id="screen-contas"></div>
  <div class="screen" id="screen-cartoes"></div>
  <div class="screen" id="screen-categorias"></div>
  <div class="screen" id="screen-orcamentos"></div>
  <div class="screen" id="screen-metas"></div>
  <div class="screen" id="screen-investimentos"></div>
  <div class="screen" id="screen-relatorios"></div>
  <div class="screen" id="screen-chatia"></div>
  <div class="screen" id="screen-config"></div>
</div>

</div>

<div id="authScreen" class="app" style="display:flex;">
  <div class="main" style="max-width:900px; margin:0 auto; padding-top:40px;" id="authArea"></div>
</div>

<div class="overlay" id="overlay-novaTransacao"><div class="modal" id="modalNovaTransacaoBody"></div></div>
<div class="overlay" id="overlay-editarTransacao"><div class="modal" id="modalEditarTransacaoBody"></div></div>
<div class="overlay" id="overlay-novaConta"><div class="modal" id="modalNovaContaBody"></div></div>
<div class="overlay" id="overlay-novoCartao"><div class="modal" id="modalNovoCartaoBody"></div></div>
<div class="overlay" id="overlay-novaMeta"><div class="modal" id="modalNovaMetaBody"></div></div>
<div class="overlay" id="overlay-novoAtivo"><div class="modal" id="modalNovoAtivoBody"></div></div>
<div class="overlay" id="overlay-novaSubcategoria"><div class="modal" id="modalNovaSubcategoriaBody"></div></div>
<div class="overlay" id="overlay-syncManual"><div class="modal" id="modalSyncManualBody"></div></div>
<div class="overlay" id="overlay-syncColar"><div class="modal" id="modalSyncColarBody"></div></div>

<script type="module" src="googlesync.js"></script>
  <script src="seed.js"></script>
  <script src="crypto.js"></script>
  <script src="logic.js"></script>
  <script src="storage.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
